name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build
        run: docker build -t ghcr.io/kahdeg-15520487/gd-dtv:latest -t ghcr.io/kahdeg-15520487/gd-dtv:${{ github.sha }} .
      - name: Push
        run: docker push ghcr.io/kahdeg-15520487/gd-dtv:latest && docker push ghcr.io/kahdeg-15520487/gd-dtv:${{ github.sha }}
